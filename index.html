<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abbas Chess AI | المحلل الذكي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="app-container">
        <header class="glass-header">
            <h1 class="title">ABBAS <span class="highlight">CHESS</span></h1>
            <div id="engine-status" class="status-badge">جاهز للتحليل</div>
        </header>

        <section class="board-section">
            <div id="myBoard"></div>
        </section>

        <section class="control-panel">
            <div class="card eval-card">
                <div class="card-header">
                    <span>تحليل الموقف (Eval)</span>
                    <span id="eval-num" class="badge">0.00</span>
                </div>
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>
            </div>

            <div class="card moves-card">
                <div class="move-item primary">
                    <span class="rank">🥇</span>
                    <span id="move-1">بانتظار الحركة...</span>
                </div>
                <div class="move-item secondary">
                    <span class="rank">🥈</span>
                    <span id="move-2">---</span>
                </div>
            </div>

            <div class="action-grid">
                <div class="timer-box">
                    <small>وقت الانتظار</small>
                    <div id="wait-timer" class="timer">00s</div>
                </div>
                <div class="input-group">
                    <input type="text" id="fen-input" placeholder="لصق كود الـ FEN للسرعة...">
                    <button onclick="loadFenFromInput()" class="btn-primary">تحليل</button>
                </div>
            </div>

            <button class="btn-reset" onclick="resetGame()">إعادة ضبط اللوحة</button>
        </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
